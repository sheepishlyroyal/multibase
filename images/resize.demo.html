<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>images/resize — demo</title>
    <style>
      body { font: 14px/1.5 system-ui; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
      .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
      .cols img { width: 100%; border: 1px solid #e4e4e7; border-radius: 4px; }
      label { display: inline-block; margin: .5rem 1rem .5rem 0; }
      input[type="number"] { width: 100px; }
    </style>
  </head>
  <body>
    <h1>images/resize demo</h1>
    <p>
      Pick an image and compare the resized version with the original. Runs
      entirely in the browser — nothing uploaded.
    </p>
    <input type="file" id="file" accept="image/*" />
    <div>
      <label>Max width: <input type="number" id="w" value="800" /></label>
      <label>Max height: <input type="number" id="h" value="800" /></label>
      <label>Quality: <input type="number" id="q" value="0.8" step="0.05" min="0" max="1" /></label>
    </div>
    <div id="result" hidden>
      <p><strong>Before:</strong> <span id="before"></span> &middot; <strong>After:</strong> <span id="after"></span></p>
      <div class="cols">
        <div><strong>Original</strong><br /><img id="orig" /></div>
        <div><strong>Resized</strong><br /><img id="resized" /></div>
      </div>
    </div>

    <script type="module">
      import { ImagesResize } from "./resize.js";
      const r = new ImagesResize();
      const $ = (id) => document.getElementById(id);
      $("file").addEventListener("change", run);
      ["w", "h", "q"].forEach((id) => $(id).addEventListener("input", run));

      async function run() {
        const file = $("file").files[0];
        if (!file) return;
        const resized = await r.fit(file, {
          maxWidth: Number($("w").value),
          maxHeight: Number($("h").value),
          quality: Number($("q").value),
        });
        $("orig").src = URL.createObjectURL(file);
        $("resized").src = URL.createObjectURL(resized);
        $("before").textContent = fmt(file.size);
        $("after").textContent = fmt(resized.size);
        $("result").hidden = false;
      }

      function fmt(b) {
        if (b < 1024) return `${b} B`;
        if (b < 1048576) return `${(b / 1024).toFixed(1)} KB`;
        return `${(b / 1048576).toFixed(2)} MB`;
      }
    </script>
  </body>
</html>
