<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>images/lazy — demo</title>
    <style>
      body { font: 14px/1.5 system-ui; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
      .spacer { height: 2000px; display: grid; place-items: center; color: #a1a1aa; background: repeating-linear-gradient(45deg, #fafafa, #fafafa 20px, #f4f4f5 20px, #f4f4f5 40px); border-radius: 6px; }
      .grid { display: grid; gap: 1rem; }
      .grid img { width: 100%; min-height: 260px; background: #f4f4f5; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>images/lazy demo</h1>
    <p>
      Images below carry <code>data-src</code> — not <code>src</code> — until they scroll
      into view. Open devtools Network tab and watch requests fire as you scroll.
    </p>
    <div class="spacer">↓ scroll 2000 px ↓</div>
    <div class="grid" id="grid"></div>

    <script type="module">
      import { ImagesLazy } from "./lazy.js";

      const lazy = new ImagesLazy({ rootMargin: "100px" });
      const urls = Array.from({ length: 12 }, (_, i) =>
        `https://picsum.photos/seed/multibase${i}/640/360`
      );
      const grid = document.getElementById("grid");
      grid.innerHTML = urls.map((u) => `<img data-src="${u}" alt="" />`).join("");
      lazy.observe(grid.querySelectorAll("img"));
    </script>
  </body>
</html>
